# https://wikitech.wikimedia.org/wiki/Help:Toolforge/Jobs_framework
---

- name: wikidata-geo-dumps-generate
  command: generate
  cpu: 2
  image: tool-wikidata-geo-dumps/tool-wikidata-geo-dumps:latest
  mem: 2Gi
  mount: all
  schedule: "@daily"
  retry: 1
  emails: onfailure
  timeout: 28800

- name: wikidata-geo-dumps-test
  command: generate --test
  cpu: 2
  image: tool-wikidata-geo-dumps/tool-wikidata-geo-dumps:latest
  mem: 2Gi
  mount: all
